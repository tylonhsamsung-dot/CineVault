name: Build CineVault EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller requests Pillow python-vlc pystray watchdog

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "CineVault" media_player.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CineVault
          path: dist/CineVault.exe
